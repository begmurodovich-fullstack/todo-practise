<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-pattern"></div>
  
  <div class="app">
    <div class="header">
      <div class="title-row">
        <h1>Todo App</h1>
        <div class="progress-ring">
          <svg>
            <circle class="ring-bg" cx="24" cy="24" r="20"/>
            <circle class="ring-progress" cx="24" cy="24" r="20"/>
          </svg>
          <span class="progress-text">0%</span>
        </div>
      </div>
      <button id="themeToggle" class="theme-btn" aria-label="Toggle theme">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>

    <div class="input-wrapper">
      <div class="input-row">
        <input type="text" id="taskInput" placeholder="Add a new task..." />
        <button id="addBtn" class="btn btn-primary">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          <span>Add</span>
        </button>
      </div>
    </div>

    <div class="toolbar">
      <div class="filters">
        <button class="filter-btn active" data-filter="all">
          <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
          </svg>
          All
        </button>
        <button class="filter-btn" data-filter="active">
          <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
          </svg>
          Active
        </button>
        <button class="filter-btn" data-filter="completed">
          <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
          Done
        </button>
      </div>
      <div class="actions">
        <button id="clearCompletedBtn" class="btn btn-sm btn-warning">
          <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
          </svg>
          Clear
        </button>
        <button id="deleteAllBtn" class="btn btn-sm btn-danger">
          <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
          </svg>
          Delete
        </button>
      </div>
    </div>

    <ul id="taskList"></ul>
    
    <div class="empty" id="emptyMessage">
      <div class="empty-illustration">
        <svg viewBox="0 0 120 120" fill="none">
          <circle cx="60" cy="60" r="50" fill="var(--bg-tertiary)"/>
          <rect x="35" y="45" width="50" height="8" rx="4" fill="var(--text-muted)" opacity="0.3"/>
          <rect x="35" y="58" width="35" height="8" rx="4" fill="var(--text-muted)" opacity="0.2"/>
          <circle cx="80" cy="85" r="15" fill="var(--accent-blue)" opacity="0.2"/>
          <path d="M75 85l4 4 8-8" stroke="var(--accent-blue)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <p>No tasks yet</p>
      <span>Add your first task above!</span>
    </div>
  </div>
  <script src="index.js"></script>
</body>
</html>
